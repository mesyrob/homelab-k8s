apiVersion: v1
kind: Namespace
metadata:
  name: hermes-agent
  labels:
    # Hermes' upstream image starts as root for the s6-overlay cont-init.d
    # phase (chown of the data volume, optional UID remap) and then drops to
    # uid 10000 itself. "restricted" PSS forbids root unconditionally, so use
    # "baseline" — privileged/hostPath/etc. are still blocked.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: baseline
