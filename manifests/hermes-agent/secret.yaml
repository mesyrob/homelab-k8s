apiVersion: v1
kind: Secret
metadata:
  name: hermes-agent-secrets
  namespace: hermes-agent
type: Opaque
# Real values are filled in OUT-OF-BAND via `kubectl create secret generic`
# (see manifests/hermes-agent/README.md). The ArgoCD Application has
# ignoreDifferences on /data so Argo will not overwrite the live values
# back to these placeholders. Same pattern as language-tutor.
#
# The seed-config initContainer skips any key whose value is empty, so a
# fresh sync against this placeholder file will start the pod with NO
# Telegram/Anthropic credentials wired — Hermes will boot but refuse to
# connect, exactly the right "loud no-op" until the secret is populated.
stringData:
  ANTHROPIC_API_KEY: ""
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_ALLOWED_USERS: ""
