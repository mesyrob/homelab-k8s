apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: subnet-router
  namespace: tailscale-subnet
spec:
  serviceName: subnet-router
  replicas: 1
  selector:
    matchLabels:
      app: subnet-router
  template:
    metadata:
      labels:
        app: subnet-router
    spec:
      serviceAccountName: subnet-router
      containers:
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:latest
          imagePullPolicy: Always
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
                  optional: true
            - name: TS_HOSTNAME
              value: "homelab-cluster-router"
            - name: TS_ROUTES
              value: "10.244.0.0/16,10.96.0.0/12,192.168.128.0/23"
            - name: TS_KUBE_SECRET
              value: "tailscale-state"
            - name: TS_USERSPACE
              value: "false"
            - name: TS_DEBUG_FIREWALL_MODE
              value: "nftables"
            - name: TS_EXTRA_ARGS
              value: "--advertise-tags=tag:k8s --snat-subnet-routes=true"
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
