apiVersion: v1
kind: ServiceAccount
metadata:
  name: subnet-router
  namespace: tailscale-subnet
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: subnet-router
  namespace: tailscale-subnet
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resourceNames: ["tailscale-state"]
    resources: ["secrets"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: subnet-router
  namespace: tailscale-subnet
subjects:
  - kind: ServiceAccount
    name: subnet-router
    namespace: tailscale-subnet
roleRef:
  kind: Role
  name: subnet-router
  apiGroup: rbac.authorization.k8s.io
