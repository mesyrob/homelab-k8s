apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes-agent
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mesyrob/homelab-k8s
    targetRevision: HEAD
    path: manifests/hermes-agent
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # The hermes-agent-secrets Secret is created out-of-band via
  # `kubectl create secret generic` and is intentionally NOT shipped in git
  # (see manifests/hermes-agent/README.md). Argo doesn't track it, doesn't
  # prune it, doesn't clobber it. Same approach as language-tutor.
